name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Build with PyInstaller
        run: python -m PyInstaller --clean GetTracks.spec

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "dist/GetTracks-$version-windows-x64.zip"
          Compress-Archive -Path dist/GetTracks/* -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GetTracks ${{ env.VERSION }}"
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
